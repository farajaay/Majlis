name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017
    defaults:
      run:
        working-directory: ./webapp

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: './webapp/package-lock.json'
    - run: npm ci
    - run: npm run build
    - run: node tests/smoke.test.mjs
      env:
        NEXTAUTH_SECRET: ci-test-secret-not-for-production
        NEXTAUTH_URL: http://127.0.0.1:3000
        GITHUB_ID: ci-placeholder
        GITHUB_SECRET: ci-placeholder
        ALLOWED_GITHUB_LOGINS: ${{ secrets.CI_TEST_GITHUB_LOGIN }}
        TEST_GITHUB_TOKEN: ${{ secrets.CI_TEST_GITHUB_TOKEN }}
